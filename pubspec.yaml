name: pitwall
description: "Your personal F1 intelligence dashboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  http: ^1.2.1
  webview_flutter: ^4.7.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  percent_indicator: ^4.2.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
