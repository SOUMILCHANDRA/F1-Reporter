name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Run every 14 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          if [ -n "${{ secrets.RENDER_API_URL }}" ]; then
            curl -s "${{ secrets.RENDER_API_URL }}/health"
          else
            echo "RENDER_API_URL secret not set. Skipping ping."
          fi
